<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Twitter Clone</title>

  <!-- Small inline script to set theme before the page renders (prevents flash) -->
  <script>
    (function() {
      try {
        var t = localStorage.getItem('dark');
        if (t === "true") {
          document.documentElement.classList.add('dark');
        }
      } catch(e){}
    })();
  </script>

  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
</head>

<body>

  <!-- LOGIN MODAL (shows on page load if not logged in) -->
  <div id="loginModal" class="modal-overlay">
    <div class="login-modal">
      <div class="modal-header">
        <h2>Welcome to Twitter Clone</h2>
      </div>
      
      <div class="modal-content">
        <div class="form-group">
          <label for="usernameInput">Username</label>
          <input id="usernameInput" type="text" placeholder="Enter your username" />
        </div>
        
        <div class="form-group">
          <label for="handleInput">Handle (e.g., @yourname)</label>
          <input id="handleInput" type="text" placeholder="@yourname" />
        </div>
        
        <button id="signInBtn" class="sign-in-btn">Sign In</button>
      </div>
    </div>
  </div>

  <div class="container">

    <!-- LEFT SIDEBAR -->
    <nav class="sidebar">

      <div>
        <div class="logo">
          <i class="fa-brands fa-x-twitter"></i>
        </div>

        <div class="nav">
          <div class="nav-item"><i class="fa fa-home"></i> Home</div>
          <div class="nav-item" id="exploreNav"><i class="fa fa-hashtag"></i> Explore</div>
          <div class="nav-item"><i class="fa fa-bell"></i> Notifications</div>
          <div class="nav-item"><i class="fa fa-envelope"></i> Messages</div>
        </div>
      </div>

      <div class="sidebar-bottom">
        <div class="profile">
          <div>
            <b id="profileUsername">You</b><br />
            <small id="profileHandle">@user</small>
          </div>
          <i class="fa fa-ellipsis"></i>
        </div>

        <!-- Dark mode toggle -->
        <div style="margin-top:12px;">
          <button id="darkToggle" onclick="toggleDark()" aria-pressed="false">🌙 Toggle Dark</button>
        </div>

        <!-- Logout button -->
        <div style="margin-top:8px;">
          <button id="logoutBtn" class="logout-btn">🚪 Logout</button>
        </div>
      </div>

    </nav>

    <!-- CENTER FEED (wraps tweet box and tweets) -->
    <main class="feed" role="main" aria-label="Timeline">

      <!-- sticky header -->
      <header class="header">
        <h2>Home</h2>
        <div class="header-right"><i class="fa fa-cog"></i></div>
      </header>

      <!-- TWEET BOX -->
      <section class="tweet-box" aria-label="Create a tweet">
        <textarea id="tweetInput" placeholder="What's happening?" rows="3"></textarea>
        <div class="tweet-controls">
          <small id="charCount">280</small>
          <button id="tweetButton" onclick="addTweet()">Tweet</button>
        </div>
      </section>

      <!-- TWEETS CONTAINER -->
      <section id="tweets" aria-live="polite" class="tweets-list"></section>

    </main>

    <!-- RIGHT SIDEBAR -->
    <aside class="right" aria-label="Trending">
      <div class="trending">

        <!-- Search bar with icons inside -->
        <div class="search">
          <button class="search-icon-btn" id="searchIcon" aria-hidden="true" title="Search"><i class="fa fa-search"></i></button>
          <input id="searchInput" type="search" placeholder="Search Twitter" aria-label="Search" />
          <button id="clearSearch" class="clear-btn" aria-label="Clear search" title="Clear search"><i class="fa fa-times"></i></button>
        </div>

        <h3>Trending</h3>

        <p>#JavaScript</p>
        <p>#HTML</p>
        <p>#CSS</p>
        <p>#Frontend</p>
        <p>#WebDevelopment</p>

      </div>
    </aside>

  </div>

  <!-- EXPLORE MODAL (hidden by default) -->
  <div id="exploreModal" class="modal-overlay">
    <div class="explore-modal">
      <div class="modal-header">
        <h2>Explore</h2>
        <button id="closeExplore" class="close-btn" aria-label="Close"><i class="fa fa-times"></i></button>
      </div>
      
      <div class="modal-content">
        <div class="explore-search">
          <input id="exploreSearchInput" type="search" placeholder="Search trends..." />
        </div>
        
        <div id="exploreList" class="explore-list">
          <!-- Trending items will be populated here -->
        </div>
      </div>
    </div>
  </div>

  <!-- External JS -->
  <script src="app.js"></script>
</body>
</html>
